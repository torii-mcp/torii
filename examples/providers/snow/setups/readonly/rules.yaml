version: "1.0"

# Política de leitura para o Snowflake. A fronteira dura contra SQL destrutivo é
# um role read-only no próprio Snowflake; estas regras são defense-in-depth,
# auditoria e UX. Os deny são regex e casam a palavra em qualquer posição da
# query (deny vence o accept), então "select 1; truncate t" é barrado. Regex é
# best-effort: concatenação dinâmica e stored procedures escapam — daí o role.

deny:
  - "/\\btruncate\\b/i"
  - "/\\bdrop\\b/i"
  - "/\\bdelete\\b/i"
  - "/\\bupdate\\b/i"
  - "/\\binsert\\b/i"
  - "/\\bmerge\\b/i"
  - "/\\balter\\b/i"
  - "/\\bcreate\\b/i"
  - "/\\bgrant\\b/i"
  - "/\\brevoke\\b/i"
  - "/execute\\s+immediate/i"
  - "/copy\\s+into/i"
  - "/\\bput\\b/i"

accept:
  # Libera SQL inline; os deny acima barram as operações destrutivas. Adicione
  # subcomandos de leitura da sua instalação conforme necessário (ex.: "object list").
  - "sql -q"
  - "sql --query"
