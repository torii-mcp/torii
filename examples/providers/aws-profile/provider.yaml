version: "1"
name: aws-profile
tool: aws_profile
description: Executa AWS CLI por aliases humanos de profile e conta verificada.
command: aws
args_prefix: []

targeting:
  mode: aws_profile

policy:
  minimum_accept_tokens: 2

auth:
  strategy: inherited
  validate:
    command: aws
    args: [sts, get-caller-identity]
  identity:
    command: aws
    args: [sts, get-caller-identity]
    field: Account
    cache_ttl_seconds: 300
  # The profile is authoritative, so strip every ambient AWS override, including
  # region and endpoint, and inject only the selected profile.
  profile_env: AWS_PROFILE
  removed_env:
    - AWS_PROFILE
    - AWS_DEFAULT_PROFILE
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_SESSION_TOKEN
    - AWS_SECURITY_TOKEN
    - AWS_WEB_IDENTITY_TOKEN_FILE
    - AWS_ROLE_ARN
    - AWS_ROLE_SESSION_NAME
    - AWS_CONTAINER_CREDENTIALS_RELATIVE_URI
    - AWS_CONTAINER_CREDENTIALS_FULL_URI
    - AWS_CONTAINER_AUTHORIZATION_TOKEN
    - AWS_CONTAINER_AUTHORIZATION_TOKEN_FILE
    - AWS_ENDPOINT_URL
    - AWS_ENDPOINT_URL_STS
    - AWS_CA_BUNDLE
    - AWS_REGION
    - AWS_DEFAULT_REGION
  cache_ttl_seconds: 300

environment:
  file: .env
