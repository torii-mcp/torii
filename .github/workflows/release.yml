name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - label: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    env:
      TORII_NO_GUI: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Linux archive
        if: runner.os == 'Linux'
        shell: bash
        run: |
          package="torii-${GITHUB_REF_NAME}-${{ matrix.platform }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/torii" "dist/${package}/"
          cp README.md LICENSE "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          cd dist
          sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "torii-${env:GITHUB_REF_NAME}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Path "dist/$package" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/torii.exe" "dist/$package/"
          Copy-Item README.md, LICENSE "dist/$package/"
          Compress-Archive -Path "dist/$package" -DestinationPath "dist/$package.zip"
          $hash = (Get-FileHash "dist/$package.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $package.zip" | Set-Content "dist/$package.zip.sha256" -Encoding ascii

      - name: Upload packaged binary
        uses: actions/upload-artifact@v6
        with:
          name: torii-${{ matrix.platform }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Torii $GITHUB_REF_NAME" \
            --generate-notes
